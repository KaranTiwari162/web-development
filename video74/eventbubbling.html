<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event bubling</title>
    <style>
        .container{
    background-color: rgb(255, 221, 3);
    border: 2px solid black;
    margin: 12px;
    padding: 12px;
}
        .child_container{
    background-color: rgba(238, 243, 243, 0.792);
    /* border: 2px solid black; */
    margin: 12px;
    padding: 12px;
}
        .child{
    background-color: rgb(3, 244, 244);
    border: 2px solid black;
    margin: 12px;
    padding: 12px;
    text-align: center;
    color: rgba(9, 9, 9, 0.871);
}
    </style>
</head>
<body>
    
    <div class="container">
        <section class="child_container">
            <div class="child">
                Hey I am Child
            </div>
        </section>
    </div>
</body>
<script>
document.querySelector(".child").addEventListener("click",(e)=>{
    e.stopPropagation
    alert("Child was clicked")
})
document.querySelector(".child_container").addEventListener("click",(e)=>{
    alert("Child_container was clicked")
})
document.querySelector(".container").addEventListener("click",(e)=>{
    alert("Container was clicked")
})
function getRandomColor(){
    let val1 = Math.ceil(0 + Math.random()* 255);
    let val2 = Math.ceil(0 + Math.random()* 255);
    let val3 = Math.ceil(0 + Math.random()* 255);
    return `rgb(${val1}, ${val2}, ${val3})`
}
setInterval(() => {
    document.querySelector(".child_container").style.background=getRandomColor()
}, 1000);
</script>
</html>
